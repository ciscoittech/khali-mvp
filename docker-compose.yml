services:
  khali-agents:
    build:
      context: ./services/agents
      dockerfile: Dockerfile
    container_name: khali-agents
    restart: unless-stopped
    ports:
      - "127.0.0.1:8200:8000"
    env_file:
      - ./services/agents/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
